<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>礼宝故事世界</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(#eaf6ff, #ffffff);
    font-family: "Microsoft YaHei", sans-serif;
}

/* =========================
   主容器
========================= */

#app {
    position: relative;
    width: 100%;
    height: 100%;
}

/* =========================
   中间图片
========================= */
#center-image {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);

    max-width: 75%;
    max-height: 75%;

    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    background: white;
    z-index: 2;
}

/* =========================
   左下角：礼宝
========================= */
#libao-container {
    position: absolute;
    left: -100px;
    bottom: 0;

    width: 25vw;
    height: 33vh;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);

    border-radius: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    mask-image: radial-gradient(circle, black 50%, transparent 60%);
}

#libao-container.locked {
    pointer-events: none;
}

/* 礼宝图片 */
#libao {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

#libao-img,
#libao-video {
    position: absolute;
    left: 0;
    bottom: 0;

    width: 100%;
    height: 100%;

    object-fit: contain;
}

/* =========================
   思考状态 + 进度条
========================= */
#progress-box {
    position: absolute;
    top: -40px;
    left: 10px;

    width: 80%;
    padding: 6px;

    background: rgba(255,255,255,0.92);
    border-radius: 8px;

    font-size: 10px;

    display: none;
}

#progress-bar {
    height: 6px;
    width: 100%;
    background: #ddd;
    border-radius: 4px;
    overflow: hidden;
}

#progress-bar::after {
    content: "";
    display: block;
    height: 100%;
    width: 50%;
    background: #4a90e2;

    transform: translateX(20px); /* ⭐往右移动 */
}

/* =========================
   右下角对话框
========================= */
#dialog {
    position: absolute;
    right: 20px;
    bottom: 20px;

    width: 320px;
    min-height: 120px;

    background: rgba(255,255,255,0.95);
    border-radius: 14px;
    padding: 14px;

    box-shadow: 0 8px 25px rgba(0,0,0,0.15);

    font-size: 20px;
    line-height: 1.5;
    color: #333;
    z-index: 2
}

#gallery img:hover {
    transform: scale(1.05);
    cursor: pointer;
}

/* =========================
   输入区
========================= */
#input-box {
    position: absolute;
    left: 50%;
    bottom: 20px;
    transform: translateX(-50%);

    display: flex;
    gap: 8px;

    z-index: 9999;
}

#user-input {
    width: 260px;
    padding: 8px 10px;
    font-size: 18px;   /* ⭐文字变大 */
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

/* =========================
   开场动画层
========================= */
#intro-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: #f5f1e8;
    background-size: cover;
    background-position: center;

    z-index: 99999;
}

#intro-video {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* ⭐关键 */
    background: #f5f1e8; ;     /* ⭐避免黑边突兀 */
}


button {
    padding: 12px 18px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #4a90e2;
    color: white;
    cursor: pointer;
}


button:hover {
    background: #357bd8;
    transform: scale(1.05);
    transition: 0.2s;
}

button:disabled {
    background: #aaa;
    cursor: not-allowed;
}
</style>
</head>

<body>

<div id="app">
        <!-- ⭐ 开场动画层 -->
    <div id="intro-screen">
        <video id="intro-video" playsinline>
            <source src="/static/video/翻书.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 中间图片 -->
    <img id="center-image" src="" />

    <!-- 左下角礼宝 -->
    <div id="libao-container">

        <div id="progress-box">
            <div>礼宝正在思考...</div>
            <div id="progress-bar"></div>
        </div>

        <img id="libao-img" src="/static/photo/礼宝.png" onclick="clickLibao()" style="cursor:pointer;" />

        <video id="libao-thinking-video"
            preload="auto"
            style="display:none; width:100%; height:100%; object-fit:contain;"
            loop playsinline>
            <source src="/static/video/礼宝_思考.mp4" type="video/mp4">
        </video>

        <video id="libao-video"
            preload="auto"
            style="display:none; width:100%; height:100%; object-fit:contain;"
            onclick="clickLibao()">
            <source src="/static/video/礼宝_说话.mp4" type="video/mp4">
        </video>

    </div>

    <!-- 右下角故事 -->
    <div id="dialog">大家好!我是礼宝，让我们一起开启今天的故事会吧~</div>

    <!-- 输入区 -->
    <div id="input-box">
        <input id="user-input" placeholder="输入你的选择或想法..." />
        <button onclick="startVoice()">🎤 说话</button>
        <button id="send-btn" onclick="send()">发送</button>
        <button id="hint-btn" onclick="showChoices()">💡 提示</button>
    </div>

    <img
        id="gallery-btn"
        src="/static/photo/gallery.png"
        onclick="toggleGallery()"
        style="
            position:absolute;
            top:20px;
            right:20px;
            z-index:10000;
            width:300px;      /* ⭐变大 */
            height:300px;
            cursor:pointer;
            border-radius:12px;
            transition:0.2s;
        "
        onmouseover="this.style.transform='scale(1.1)'"
        onmouseout="this.style.transform='scale(1)'"
    />
    <div id="gallery" style="
        display:none;
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:#f5f1e8;
        z-index:9999;
        overflow:auto;
        padding:20px;
    ">
        <button onclick="toggleGallery()">⬅ 返回</button>
            <!-- ⭐就在这里加 ZIP按钮 -->
        <button onclick="downloadZip()" style="
            margin:10px;
            padding:10px 16px;
            font-size:16px;
            border-radius:10px;
            background:#4a90e2;
            color:white;
            border:none;
            cursor:pointer;
        ">
        📦 一键下载故事ZIP
        </button>
        <div id="gallery-list" style="
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            margin-top:10px;
        "></div>
    </div>

    <div id="choice-box" style="
        display:none;
        position:absolute;
        right:20px;
        bottom:160px;
        width:320px;
        background:white;
        border-radius:12px;
        padding:12px;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        font-size:14px;
        z-index: 3
    ">
    </div>

</div>

<script>
let locked = false;
let talking = false;
let audioPlayer = null;
let audioPlayer1 = null;
let hasStartedStory = false;
let fullStory = "";   // ⭐保存完整故事（核心）
let imageHistory = [];   // ⭐保存图片历史
let audioHistory = [];
const preloadImg = new Image();
preloadImg.src = "/static/photo/翻书_最后一页.jpg";
let isPlaying = false;

function clickLibao() {
    const img = document.getElementById("libao-img");
    const video = document.getElementById("libao-video");

    talking = !talking;

    if (talking) {
        img.style.display = "none";
        video.style.display = "block";

        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.load();
        video.play().catch(console.log);

        if (!hasStartedStory) {
            introAudio.currentTime = 0;
            introAudio.play();
            return;
        }

        if (audioPlayer) {
            audioPlayer.play();
        }

    } else {
        video.pause();
        video.currentTime = 0;

        video.style.display = "none";
        img.style.display = "block";

        if (audioPlayer) {
            audioPlayer.pause();
        }
    }
}

async function send() {

    if (locked) return;
    hasStartedStory = true;
    const inputEl = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const hint_btn = document.getElementById("hint-btn");
    const input = inputEl.value.trim();
    if (!input) return;

    locked = true;

    /* =========================
       进入加载状态
    ========================= */
    inputEl.disabled = true;
    btn.disabled = true;
    hint_btn.disabled = true;
    const img = document.getElementById("libao-img");
    const thinkingVideo = document.getElementById("libao-thinking-video");

    // 切换显示
    img.style.display = "none";
    thinkingVideo.style.display = "block";
    thinkingVideo.volume = 0.4
    // 播放循环视频
    thinkingVideo.currentTime = 0;
    // ⭐关键：尝试播放
    thinkingVideo.play().catch(err => {
        console.log("自动播放被拦截，需要用户交互");
    });

    document.getElementById("progress-box").style.display = "block";
    document.getElementById("libao-container").classList.add("locked");

    try {
        const res = await fetch("/story", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                story: fullStory,   // ⭐传完整历史
                input: input
            })
        });

        const data = await res.json();
        fullStory += data.story;
        document.getElementById("dialog").innerText = data.story;
        window.currentChoices = data.choices;
        if (data.image) {
            document.getElementById("center-image").src = data.image;

            // ⭐保存历史
            imageHistory.push(data.image);
        }

        const audioRes = await fetch("/tts", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ text: data.story })
        });

        const blob = await audioRes.blob();
        const url = URL.createObjectURL(blob);
        audioPlayer = new Audio(url);
        audioPlayer.onended = stopTalking;
        audioHistory.push(blob);
        const audioRes1 = await fetch("/tts", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ text: data.choices })
        });

        const blob1 = await audioRes1.blob();
        const url1 = URL.createObjectURL(blob1);
        audioPlayer1 = new Audio(url1);


    } catch (e) {
        console.error(e);
        alert("请求失败");
    }

    /* =========================
       恢复状态
    ========================= */

    thinkingVideo.pause();
    thinkingVideo.currentTime = 0;
    thinkingVideo.style.display = "none";
    img.style.display = "block";
    document.getElementById("progress-box").style.display = "none";
    document.getElementById("libao-container").classList.remove("locked");
    inputEl.disabled = false;
    btn.disabled = false;
    hint_btn.disabled = false;
    inputEl.value = "";
    locked = false;
}

// =========================
// 🎤 语音输入（只填文字，不自动发送）
// =========================
function startVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("当前浏览器不支持语音输入，请使用Chrome");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "zh-CN";
    recognition.interimResults = false;

    recognition.start();

    // 🎯 语音识别结果 → 填入输入框（可修改）
    recognition.onresult = function(event) {
        const text = event.results[0][0].transcript;

        const input = document.getElementById("user-input");

        // ⭐填入但不发送（关键）
        input.value = text;
    };

    recognition.onerror = function(event) {
        console.error("语音错误类型：", event.error);
        alert("语音识别失败：" + event.error);
    };
}

function showChoices() {
    const box = document.getElementById("choice-box");

    if (!box) return;

    // 切换显示
    if (box.style.display === "block") {
        box.style.display = "none";
        return;
    }

    if (!window.currentChoices) {
        box.innerText = "还没加载出来呢";
        box.style.display = "block";
        return;
    }

    // ⭐解析
    const choices = parseChoices(window.currentChoices);

    // ⭐清空
    box.innerHTML = "";

    // ⭐生成按钮
    choices.forEach(item => {
        const btn = document.createElement("button");

        btn.innerText = `${item.key}. ${item.text}`;
        btn.style.display = "block";
        btn.style.width = "100%";
        btn.style.marginBottom = "6px";

        // ⭐点击填入输入框
        btn.onclick = () => {
            document.getElementById("user-input").value = `选择${item.key}：${item.text}`;
            box.style.display = "none";
        };

        box.appendChild(btn);
    });

    box.style.display = "block";

    // ⭐播放语音
    if (audioPlayer1) {
        audioPlayer1.play();
    }
}

function parseChoices(choicesText) {
    const result = [];

    const regex = /([A-D])\.\s*([^A-D]*)/g;
    let match;

    while ((match = regex.exec(choicesText)) !== null) {
        result.push({
            key: match[1],
            text: match[2].trim()
        });
    }

    return result;
}

function toggleGallery() {
    const gallery = document.getElementById("gallery");
    const list = document.getElementById("gallery-list");

    if (gallery.style.display === "block") {
        gallery.style.display = "none";
        return;
    }

    gallery.style.display = "block";
    list.innerHTML = "";

    // ⭐ 空判断
    if (imageHistory.length === 0) {
        list.innerHTML = "<div style='font-size:20px;'>快创作你的故事吧小朋友～</div>";
        return;
    }

    imageHistory.forEach(url => {
        const wrapper = document.createElement("div");

        const img = document.createElement("img");
        img.src = url;
        img.style.width = "400px";  // ⭐两倍
        img.style.borderRadius = "12px";
        img.style.boxShadow = "0 6px 20px rgba(0,0,0,0.15)";
        img.style.margin = "10px";

        // 点击下载
        img.onclick = () => downloadImage(url);

        wrapper.appendChild(img);
        list.appendChild(wrapper);
    });
}
function downloadImage(url) {
    const a = document.createElement("a");
    a.href = url;
    a.download = "story_image.png";  // ⭐下载文件名
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function stopTalking() {
    const img = document.getElementById("libao-img");
    const video = document.getElementById("libao-video");

    video.pause();
    video.currentTime = 0;
    video.style.display = "none";

    img.style.display = "block";
    talking = false;
}

window.onload = function () {
    const thinking = document.getElementById("libao-thinking-video");
    const speak = document.getElementById("libao-video");

    [thinking, speak].forEach(v => {
        v.preload = "auto";
        v.load();   // ⭐关键：强制浏览器开始缓存
    });
    const video = document.getElementById("intro-video");
    const screen = document.getElementById("intro-screen");
    let introPlayed = false; // ⭐只允许一次
    introAudio = new Audio("/static/audio/welcome.mp3");
    introAudio.onended = stopTalking;
    // ⭐点击开始播放
    screen.onclick = function () {
        if (introPlayed) return;   // ⭐已经播放过就不再执行
        introPlayed = true;

        video.play();
    };

    // ⭐播放结束
    video.onended = function () {

        // ⭐1. 视频渐隐（电影感）
        video.style.transition = "opacity 0.5s";
        video.style.opacity = "0";

        setTimeout(() => {
            // ⭐2. 隐藏视频
            video.pause();
            video.style.display = "none";
            // ⭐3. 切背景（最后一页）
            const bg = `url('${preloadImg.src}') center center / cover no-repeat`;
            screen.style.background = bg;
            document.body.style.background = bg;
            // ⭐4. 停留一下（翻书停顿）
            setTimeout(() => {
                // ⭐5. 整体淡出进入主界面
                screen.style.transition = "opacity 1s";
                screen.style.opacity = "0";
                setTimeout(() => {
                    screen.style.display = "none";
                }, 1000);
            }, 800);

        }, 300);
    };
};

async function downloadZip() {

    if (imageHistory.length === 0) {
        alert("还没有故事内容哦");
        return;
    }

    const zip = new JSZip();
    const imgFolder = zip.folder("images");
    const audioFolder = zip.folder("audio");

    // ======================
    // 图片 + 音频打包（安全版）
    // ======================
    const len = imageHistory.length;

    for (let i = 0; i < len; i++) {
        const url = "/proxy_image?url=" + encodeURIComponent(imageHistory[i]);

        const res = await fetch(url);
        const blob = await res.blob();

        imgFolder.file(`img_${i}.jpeg`, blob);
        // -------- 音频 --------
        const audio = audioHistory[i];

        if (audio instanceof Blob) {
            audioFolder.file(`audio_${i}.mp3`, audio);
        }
    }

    // ======================
    // 文本
    // ======================
    zip.file("story.txt", fullStory || "");

    // ======================
    // 生成 ZIP（关键）
    // ======================
    zip.generateAsync({
        type: "blob",
        compression: "DEFLATE",
        compressionOptions: { level: 6 }
    }).then(function (content) {
        saveAs(content, "礼宝故事.zip");
    }).catch(err => {
        console.error("ZIP生成失败:", err);
    });
}
</script>
</body>
</html>
