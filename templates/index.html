<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AI故事机</title>

<style>
body {
    font-family: sans-serif;
    padding: 20px;
    background: #f5f5f5;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

#story {
    margin-bottom: 15px;
    line-height: 1.6;
}

img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 15px;
}

button {
    width: 45%;
    margin: 5px;
    padding: 12px;
    font-size: 16px;
}
</style>

</head>

<body>

<div class="container">

<h2>🌟 AI故事机</h2>

<p id="story">在森林里，小熊找不到回家的路。</p>

<img id="image" src="" />

<div id="buttons">
    <button onclick="send('A')">A</button>
    <button onclick="send('B')">B</button>
    <button onclick="send('C')">C</button>
    <button onclick="send('D')">D</button>
</div>

</div>

<script>

let story = "在森林里，小熊找不到回家的路。";

async function send(choice) {

    document.getElementById("story").innerText = "⏳ 正在生成...";

    const res = await fetch("/story", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            story: story,
            input: choice
        })
    });

    const data = await res.json();

    story = data.story;

    document.getElementById("story").innerText = data.story;
    document.getElementById("image").src = data.image;
}

</script>

</body>
</html>
